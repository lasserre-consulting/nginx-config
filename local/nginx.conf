server {
    listen 80;
    server_name localhost;

    # ===== LASSERRE-CONSULTING SITE (racine) =====
    location / {
        proxy_pass http://host.docker.internal:4200/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ===== CARNETROUTE =====
    location = /carnetroute {
        return 301 /carnetroute/;
    }

    location /carnetroute/api/ {
        proxy_pass http://host.docker.internal:8080/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /ws/ {
        proxy_pass http://host.docker.internal:8080/ws/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400s;
    }

    location /carnetroute/ {
        proxy_pass http://host.docker.internal:4202/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== QUALIDOC =====
    location = /qualidoc {
        return 301 /qualidoc/;
    }

    location /qualidoc/api/ {
        proxy_pass http://host.docker.internal:8083/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /qualidoc/ {
        proxy_pass http://host.docker.internal:4200;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ===== MISSION TRACKER =====
    location = /mission-tracker {
        return 301 /mission-tracker/;
    }

    location /mission-tracker/api/ {
        proxy_pass http://host.docker.internal:8081/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # SSE — scraping progress
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    location /mission-tracker/ {
        proxy_pass http://host.docker.internal:4201/mission-tracker/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
